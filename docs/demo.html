<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>b45 encoder/decoder playground</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      max-width: 56rem;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .widget {
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 0.75rem;
      padding: 1rem;
      box-shadow: 0 0.5rem 1.5rem color-mix(in srgb, CanvasText 8%, transparent);
    }

    label {
      display: block;
      font-weight: 700;
      margin-block: 1rem 0.35rem;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 8rem;
      resize: vertical;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 0.5rem;
      padding: 0.75rem;
      font: 1rem/1.4 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      background: Canvas;
      color: CanvasText;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-block: 1rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-weight: 700;
      background: #276ef1;
      color: white;
    }

    button.secondary {
      background: color-mix(in srgb, CanvasText 12%, Canvas);
      color: CanvasText;
    }

    output {
      display: block;
      min-height: 1.5rem;
      margin-block-start: 0.75rem;
      font-weight: 700;
    }

    output.error {
      color: #c62828;
    }
  </style>
</head>
<body>
  <main>
    <h1>b45 encoder/decoder playground</h1>
    <p>
      Type plain text, encode it into the QR Alphanumeric Mode-safe b45 alphabet,
      then decode it back to verify that the transform is lossless.
    </p>

    <section class="widget" aria-labelledby="widget-title">
      <h2 id="widget-title">Try b45 in your browser</h2>

      <label for="plain">Plain text</label>
      <textarea id="plain" spellcheck="false">Hello World, 😀</textarea>

      <div class="actions">
        <button type="button" id="encode">Encode ↓</button>
        <button type="button" id="decode">Decode ↑</button>
        <button type="button" id="swap" class="secondary">Swap fields</button>
        <button type="button" id="clear" class="secondary">Clear</button>
      </div>

      <label for="encoded">b45 encoded text</label>
      <textarea id="encoded" spellcheck="false"></textarea>
      <output id="status" role="status" aria-live="polite"></output>
    </section>
  </main>

  <script>
    const QR_ALPHANUMERIC = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
    const PASS_THROUGH = new Set('0123456789 $*-.'.split(''));
    const SHIFT_DECODE_BY_KEY = {
      '1': '!', '2': '@', '3': '#', '6': '^',
      '7': '&', '9': '(', '0': ')', '/': '?',
    };
    const SHIFT_ENCODE_BY_CHAR = Object.fromEntries(
      Object.entries(SHIFT_DECODE_BY_KEY).map(([key, value]) => [value, key]),
    );
    const SPECIAL_RUN_ALPHABET_BY_CHAR = { ',': ',:', ':': ',:', '"': '"/', '/': '"/' };
    const SPECIAL_SINGLE_ESCAPE_BY_CHAR = { ',': ':', ':': '::', '"': '/', '/': '//' };
    const SPECIAL_DOUBLE_ESCAPE_BY_CHAR = { ':': ':', '/': '/' };
    const SPECIAL_SINGLE_DECODE_BY_CHAR = { ':': ',', '/': '"' };
    const HEX = new Set('0123456789ABCDEF'.split(''));
    const textEncoder = new TextEncoder();
    const textDecoder = new TextDecoder('utf-8', { fatal: true });

    function encode(text) {
      const parts = [];
      let index = 0;
      while (index < text.length) {
        const char = codePointAt(text, index);
        if (SPECIAL_RUN_ALPHABET_BY_CHAR[char]) {
          index = encodeSpecialRun(text, index, SPECIAL_RUN_ALPHABET_BY_CHAR[char], parts);
          continue;
        }
        encodeChar(char, parts);
        index += char.length;
      }
      return parts.join('');
    }

    function codePointAt(text, index) {
      return String.fromCodePoint(text.codePointAt(index));
    }

    function encodeSpecialRun(text, index, alphabet, parts) {
      const start = index;
      let end = index;
      while (end < text.length && alphabet.includes(codePointAt(text, end))) {
        end += codePointAt(text, end).length;
      }

      if (end - start === 1) {
        parts.push(SPECIAL_SINGLE_ESCAPE_BY_CHAR[text[start]]);
        return end;
      }

      for (let cursor = start; cursor < end;) {
        const char = codePointAt(text, cursor);
        encodeUtf8Escape(char, parts);
        cursor += char.length;
      }
      return end;
    }

    function encodeChar(char, parts) {
      if (char >= 'a' && char <= 'z') {
        parts.push(char.toUpperCase());
      } else if (char >= 'A' && char <= 'Z') {
        parts.push(`+${char}`);
      } else if (char === '+') {
        parts.push('++');
      } else if (char === '%') {
        parts.push('%%');
      } else if (PASS_THROUGH.has(char)) {
        parts.push(char);
      } else if (SHIFT_ENCODE_BY_CHAR[char]) {
        parts.push(`+${SHIFT_ENCODE_BY_CHAR[char]}`);
      } else {
        encodeUtf8Escape(char, parts);
      }
    }

    function encodeUtf8Escape(char, parts) {
      for (const byte of textEncoder.encode(char)) {
        parts.push(`%${byte.toString(16).toUpperCase().padStart(2, '0')}`);
      }
    }

    function decode(encoded) {
      const output = [];
      let index = 0;
      while (index < encoded.length) {
        const char = encoded[index];
        if (!QR_ALPHANUMERIC.includes(char)) {
          throw new Error(`Invalid b45 character at position ${index}: ${JSON.stringify(char)}`);
        }

        if (char === '+') {
          const [decoded, nextIndex] = decodePlusEscape(encoded, index);
          output.push(decoded);
          index = nextIndex;
        } else if (SPECIAL_SINGLE_DECODE_BY_CHAR[char]) {
          const [decoded, nextIndex] = decodeSpecialEscape(encoded, index);
          output.push(decoded);
          index = nextIndex;
        } else if (char === '%') {
          const [decoded, nextIndex] = decodePercentRun(encoded, index);
          output.push(decoded);
          index = nextIndex;
        } else if (char >= 'A' && char <= 'Z') {
          output.push(char.toLowerCase());
          index += 1;
        } else if (PASS_THROUGH.has(char)) {
          output.push(char);
          index += 1;
        } else {
          throw new Error(`Invalid b45 character at position ${index}: ${JSON.stringify(char)}`);
        }
      }
      return output.join('');
    }

    function decodePlusEscape(encoded, index) {
      if (index + 1 >= encoded.length) {
        throw new Error("Dangling '+' escape at end of input");
      }
      const nextChar = encoded[index + 1];
      if (nextChar === '+') return ['+', index + 2];
      if (nextChar >= 'A' && nextChar <= 'Z') return [nextChar, index + 2];
      if (SHIFT_DECODE_BY_KEY[nextChar]) return [SHIFT_DECODE_BY_KEY[nextChar], index + 2];
      throw new Error(`Invalid '+' escape at position ${index}: '+${nextChar}'`);
    }

    function decodeSpecialEscape(encoded, index) {
      const char = encoded[index];
      if (index + 1 < encoded.length && encoded[index + 1] === char) {
        return [SPECIAL_DOUBLE_ESCAPE_BY_CHAR[char], index + 2];
      }
      return [SPECIAL_SINGLE_DECODE_BY_CHAR[char], index + 1];
    }

    function decodePercentRun(encoded, index) {
      if (index + 1 < encoded.length && encoded[index + 1] === '%') {
        return ['%', index + 2];
      }
      const bytes = [];
      const start = index;
      while (index < encoded.length && encoded[index] === '%') {
        if (index + 2 >= encoded.length) {
          throw new Error(`Incomplete percent escape at position ${index}`);
        }
        const hexDigits = encoded.slice(index + 1, index + 3);
        if (!isHexByte(hexDigits)) {
          if (index === start) {
            throw new Error(`Invalid percent escape at position ${index}: '%${hexDigits}'`);
          }
          break;
        }
        bytes.push(Number.parseInt(hexDigits, 16));
        index += 3;
      }
      try {
        return [textDecoder.decode(new Uint8Array(bytes)), index];
      } catch (error) {
        throw new Error(`Invalid UTF-8 byte escape run starting at position ${start}`);
      }
    }

    function isHexByte(value) {
      return value.length === 2 && [...value].every((char) => HEX.has(char));
    }

    const plain = document.querySelector('#plain');
    const encoded = document.querySelector('#encoded');
    const status = document.querySelector('#status');

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle('error', isError);
    }

    document.querySelector('#encode').addEventListener('click', () => {
      encoded.value = encode(plain.value);
      setStatus('Encoded successfully.');
    });

    document.querySelector('#decode').addEventListener('click', () => {
      try {
        plain.value = decode(encoded.value);
        setStatus('Decoded successfully.');
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    document.querySelector('#swap').addEventListener('click', () => {
      [plain.value, encoded.value] = [encoded.value, plain.value];
      setStatus('Swapped fields.');
    });

    document.querySelector('#clear').addEventListener('click', () => {
      plain.value = '';
      encoded.value = '';
      setStatus('Cleared.');
    });

    encoded.value = encode(plain.value);
  </script>
</body>
</html>
